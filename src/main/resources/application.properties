server.port=${SERVER_PORT:${PORT:6969}}
# Tomcat Configuration
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.max-connections=10000
server.tomcat.accept-count=100

# HikariCP Configuration
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=HikariPool-1
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=60000

# Database
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5433/issue_tracker_db}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable Hibernate auto-DDL; use Liquibase instead
spring.jpa.hibernate.ddl-auto=update
spring.liquibase.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.liquibase.LiquibaseAutoConfiguration
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,threaddump,heapdump,loggers
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
management.info.build.enabled=true

# Cache (Redis)
spring.cache.type=redis
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.timeout=2s
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0
spring.cache.redis.time-to-live=600s

# JWT
jwt.secret-key=${JWT_SECRET_KEY:564DDFE8C843709F13421E26F9456EAA3D5B1D7E053794BCF8560DB433566531}

# External Services
duplicateservice.url=${DUPLICATE_SERVICE_URL:http://localhost:5000}
classification.service.url=${CLASSIFICATION_SERVICE_URL:http://localhost:5001}
chatbot.service.url=${CHATBOT_SERVICE_URL:http://localhost:5001}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:5174}

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.path=uploads/screenshots

# Static resources
spring.web.resources.static-locations=classpath:/static/,classpath:/public/,file:uploads/
spring.web.resources.add-mappings=true

# Application
app.base-url=${APP_BASE_URL:http://localhost:80}

# Email
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Swagger/OpenAPI
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.group-configs.issue-tracker.title=Issue Tracker API
springdoc.group-configs.issue-tracker.version=1.0.0

# LDAP/Active Directory (optionnel)
ldap.url=${LDAP_URL:}
ldap.base=${LDAP_BASE:}
ldap.username=${LDAP_USERNAME:}
ldap.password=${LDAP_PASSWORD:}
ldap.user-dn-pattern=${LDAP_USER_DN_PATTERN:uid={0},ou=users}
ldap.enabled=${LDAP_ENABLED:false}

# SLA Configuration (en heures)
sla.first-response-critical=1
sla.first-response-high=4
sla.first-response-medium=8
sla.first-response-low=24
sla.resolution-critical=8
sla.resolution-high=24
sla.resolution-medium=72
sla.resolution-low=120

# Export configuration
export.excel.enabled=true
export.pdf.enabled=true

# WebSocket
app.websocket.enabled=true
app.websocket.path=/ws

# SSO / OAuth2 Configuration
sso.enabled=${SSO_ENABLED:false}
# Azure AD SSO
sso.azure.client-id=${AZURE_CLIENT_ID:}
sso.azure.client-secret=${AZURE_CLIENT_SECRET:}
sso.azure.tenant-id=${AZURE_TENANT_ID:}
# Google SSO
sso.google.client-id=${GOOGLE_CLIENT_ID:}
sso.google.client-secret=${GOOGLE_CLIENT_SECRET:}

